<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Daily Schedule Simulation</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 60px; background-color: #eef;">

  <h1>My Simulated Day</h1>
  <div id="output" style="margin-top: 40px; font-size: 1.5rem;"></div>

  <script>
    const output = document.getElementById("output");
    function logEvent(text) {
      output.innerHTML += "<p>" + text + "</p>";
    }

    const moods = ["😊", "😴", "🤔", "🎉", "😌"];

    setTimeout(() => {
      logEvent("10:00 AM - Waking up, still half asleep");
    }, 1000);

    setTimeout(() => {
      logEvent("10:15 AM - Getting ready, Breakfast in hand");
    }, 3000);

    setTimeout(() => {
      logEvent("10:45 AM - Heading to work");
    }, 5000);

    setTimeout(() => {
      logEvent("3:00 PM - Lunch break, finally");
    }, 7000);

    setTimeout(() => {
      logEvent("4:00 PM - Head back home");
    }, 9000);

    setTimeout(() => {
      logEvent("6:00 PM - Quick workout");
    }, 11000);

    setTimeout(() => {
      const randomMood = moods[Math.floor(Math.random() * moods.length)];
      logEvent("9:00 PM - Relaxing, mood right now: " + randomMood);
    }, 13000);

    setTimeout(() => {
      logEvent("12:00 AM - Lights out, day complete ✅");
    }, 15000);
  </script>

</body>
</html>
